name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest]
        compiler: [gcc-14, clang-19]
        include:
          - compiler: gcc-14
            cxx: g++-14
            cc: gcc-14
          - compiler: clang-19
            cxx: clang++-19
            cc: clang-19

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build \
            clang-19 clang++-19 g++-14

      - name: Configure
        run: |
          cmake --preset debug \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }}

      - name: Build
        run: cmake --build --preset debug --parallel $(nproc)

      - name: Run tests
        run: ./build/debug/tests/unit_tests

      - name: Layer dependency check
        run: python3 scripts/check_layer_deps.py

      - name: Format check
        run: ./scripts/format.sh --check
